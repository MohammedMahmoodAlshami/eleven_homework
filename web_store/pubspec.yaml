name: web_store
description: "A new Flutter project."

publish_to: 'none' 


version: 1.0.0+1

environment:
  sdk: ^3.11.5


dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.5
  google_fonts: ^6.3.0

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  path_provider: ^2.1.6
  connectivity_plus: ^6.1.1
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  sqflite: ^2.4.1
  path: ^1.9.1
  shared_preferences: ^2.5.5
  equatable: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.4



  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/images/

  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/web_store_icon.png"

 
  
    